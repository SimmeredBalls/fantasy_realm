<!DOCTYPE html>
<html>
<head>
    <title>The Dragon's Hoard</title>
    </head>
<body>
    <nav>
        {% if user.is_authenticated %}
            <strong>{{ user.username }}</strong> | Gold: {{ user.profile.gold }}G |
            <a href="{% url 'home' %}">Shop</a> |
            <a href="{% url 'view_cart' %}">Pouch</a> |
            <a href="{% url 'order_history' %}">Quest Log</a> |
            <form action="{% url 'logout' %}" method="post" style="display:inline;">
                {% csrf_token %}<button type="submit">Logout</button>
            </form>
        {% else %}
            <a href="{% url 'login' %}">Login</a> | <a href="{% url 'register' %}">Join Guild</a>
        {% endif %}
    </nav>
    <hr>

    {% if messages %}
        {% for message in messages %}
            <div style="color: red; padding: 10px; border: 1px solid red;">{{ message }}</div>
        {% endfor %}
    {% endif %}

    {% block content %}
    {% endblock %}

</body>
</html>
